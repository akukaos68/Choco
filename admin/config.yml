backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "productos"
    label: "Productos"
    files:
      - label: "Lista de Precios"
        name: "precios"
        file: "productos.json"
        fields:
          - label: "Productos"
            name: "productos"
            widget: "list"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Precio", name: "precio", widget: "string" }
              - { label: "ID", name: "tamano", widget: "string", required: true }
              - { label: "Link", name: "link", widget: "string" }