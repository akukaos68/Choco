<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precios – Olas de Cacao</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: url('choco7.jpeg') center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Nunito', sans-serif;
    }
    .card {
      background: rgba(190, 175, 210, 0.52);
      border-radius: 18px;
      padding: 2.2rem 2rem 1.8rem;
      max-width: 390px;
      width: 100%;
    }
    .titulo {
      font-family: 'Dancing Script', cursive;
      font-size: 3.4rem;
      color: #4a2e1a;
      text-align: center;
      margin-bottom: 1.6rem;
      line-height: 1;
    }
    ul { list-style: none; margin: 0 0 1.4rem; }
    ul li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0;
    }
    ul li::before {
      content: "•";
      color: #4a2e1a;
      font-size: 1.2rem;
      margin-right: 0.55rem;
      flex-shrink: 0;
    }
    ul li a {
      color: #4a2e1a;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      flex: 1;
    }
    ul li a:hover { opacity: 0.75; text-decoration: underline; }
    ul li .precio {
      color: #4a2e1a;
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      margin-left: 1rem;
    }
    .sello {
      text-align: center;
      margin: 1rem 0 0.5rem;
    }
    .sello-circulo {
      display: inline-block;
      border: 1.5px dashed #7a5c3a;
      border-radius: 50%;
      padding: 0.5rem 0.9rem;
      color: #7a5c3a;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1.5;
      text-transform: uppercase;
    }
    .corazon { color: #c07080; font-size: 1.2rem; display: block; text-align: center; margin: 0.3rem 0; }
    .tagline {
      text-align: center;
      color: #4a2e1a;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="titulo">Chocolates</h1>
    <ul id="lista-precios">
  <!-- Los productos se cargan con JS -->
    </ul>
    <div class="sello">
    </div>
    <span class="corazon">♡</span>
    <p class="tagline">¡No te pierdas nuestras<br>delicias de esta temporada!</p>
  </div>
</body>
  <script>
  fetch('productos.json')
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById('lista-precios');
      data.productos.forEach(p => {
        lista.innerHTML += `
          <li>
            <a href="${p.link}">${p.nombre}</a>
            <span class="precio">${p.precio}</span>
          </li>
        `;
      });
    });
  </script>
</html>
